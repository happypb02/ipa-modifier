name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup environment
      run: |
        brew install ldid
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos

    - name: Install insert_dylib
      run: |
        git clone https://github.com/Tyilo/insert_dylib
        cd insert_dylib
        xcodebuild -configuration Release
        sudo cp build/Release/insert_dylib /usr/local/bin/
        insert_dylib --version || echo "insert_dylib installed"

    - name: Build Tweak
      run: |
        cd InstallRedirect
        export THEOS=$HOME/theos
        make clean || true
        make FINALPACKAGE=1

    - name: Extract IPA
      run: |
        unzip -q 2.ipa -d temp

    - name: Copy dylib to app
      run: |
        ls -la InstallRedirect/.theos/obj/
        cp InstallRedirect/.theos/obj/InstallRedirect.dylib temp/Payload/DumpApp.app/ || \
        cp InstallRedirect/.theos/obj/debug/InstallRedirect.dylib temp/Payload/DumpApp.app/

    - name: Inject dylib
      run: |
        insert_dylib @executable_path/InstallRedirect.dylib temp/Payload/DumpApp.app/DumpApp temp/Payload/DumpApp.app/DumpApp --all-yes

    - name: Remove old signature
      run: |
        rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: |
        cd temp
        zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
