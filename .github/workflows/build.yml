name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check files
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Files in current directory ==="
        ls -la
        echo "=== Check if 2.ipa exists ==="
        if [ -f "2.ipa" ]; then
          echo "2.ipa found, size: $(stat -f%z 2.ipa 2>/dev/null || stat -c%s 2.ipa)"
        else
          echo "2.ipa NOT found"
          exit 1
        fi

    - name: Extract IPA
      run: |
        echo "=== Extracting IPA ==="
        unzip -q 2.ipa -d temp
        echo "=== Check extraction ==="
        ls -la temp/
        ls -la temp/Payload/
        if [ -f "temp/Payload/DumpApp.app/DumpApp" ]; then
          echo "Binary found"
        else
          echo "Binary NOT found"
          exit 1
        fi

    - name: Disassemble installClick
      run: python3 disasm_installclick.py

    - name: Patch binary - minimal function
      run: python3 patch_minimal.py

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
