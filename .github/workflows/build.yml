name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary
      run: |
        python3 patch_binary.py > patch.log 2>&1 || true
        cat patch.log

    - name: Save error log
      if: always()
      run: |
        if [ -f patch.log ]; then
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          cp patch.log error_log.txt
          git add error_log.txt || true
          git commit -m "Add patch error log" || true
          git push || true
        fi

    - name: Check patch result
      run: |
        if grep -q "\[!\]" patch.log; then
          echo "Patch failed"
          exit 1
        fi

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
