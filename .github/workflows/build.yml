name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Debug environment
      run: |
        echo "=== files in repo ==="
        ls -la
        echo "=== python3 version ==="
        python3 --version
        echo "=== patch_binary.py exists ==="
        test -f patch_binary.py && echo "YES" || echo "NO"
        echo "=== patch_binary.py size ==="
        wc -l patch_binary.py
        echo "=== binary exists ==="
        test -f temp/Payload/DumpApp.app/DumpApp && echo "YES" || echo "NO"

    - name: Patch binary
      run: python3 ./patch_binary.py 2>&1

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
