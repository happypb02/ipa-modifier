name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary
      run: |
        python3 << 'PYEOF'
        import struct, sys

        binary_path = "temp/Payload/DumpApp.app/DumpApp"

        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        def read_u32(data, off): return struct.unpack_from("<I", data, off)[0]
        def read_u64(data, off): return struct.unpack_from("<Q", data, off)[0]
        def read_i32(data, off): return struct.unpack_from("<i", data, off)[0]

        LC_SEGMENT_64 = 0x19
        LC_SYMTAB     = 0x2
        LC_DYSYMTAB   = 0xB

        def find_sections(data, mh_off):
            sections = {}
            sec_reserved1 = {}
            ncmds = read_u32(data, mh_off + 16)
            p = mh_off + 32
            for _ in range(ncmds):
                cmd     = read_u32(data, p)
                cmdsize = read_u32(data, p + 4)
                if cmd == LC_SEGMENT_64:
                    segname = data[p+8:p+24].rstrip(b'\x00').decode()
                    nsects  = read_u32(data, p + 64)
                    sp = p + 72
                    for _ in range(nsects):
                        sectname  = data[sp:sp+16].rstrip(b'\x00').decode()
                        vm_addr   = read_u64(data, sp + 32)
                        vm_size   = read_u64(data, sp + 40)
                        file_off  = read_u32(data, sp + 48)
                        reserved1 = read_u32(data, sp + 56)
                        key = (segname, sectname)
                        sections[key] = (file_off, vm_addr, vm_size)
                        sec_reserved1[key] = reserved1
                        sp += 80
                p += cmdsize
            return sections, sec_reserved1

        def vm_to_file(sections, vm_addr):
            for (seg, sect), (foff, vaddr, size) in sections.items():
                if vaddr <= vm_addr < vaddr + size:
                    return foff + (vm_addr - vaddr)
            return None

        # Locate ARM64 slice
        magic  = read_u32(data, 0)
        mh_off = 0
        if magic == struct.unpack(">I", b'\xCA\xFE\xBA\xBE')[0]:
            narch = struct.unpack_from(">I", data, 4)[0]
            for i in range(narch):
                base     = 8 + i * 20
                cpu_type = struct.unpack_from(">I", data, base)[0]
                if cpu_type == 0x0100000C:
                    mh_off = struct.unpack_from(">I", data, base + 8)[0]
                    break

        sections, sec_reserved1 = find_sections(data, mh_off)
        ncmds = read_u32(data, mh_off + 16)
        print(f"[*] mh_off={mh_off:#x}, sections={len(sections)}")

        # Parse LC_SYMTAB / LC_DYSYMTAB
        symtab_off = strtab_off = indirectsymoff = None
        p = mh_off + 32
        for _ in range(ncmds):
            cmd     = read_u32(data, p)
            cmdsize = read_u32(data, p + 4)
            if cmd == LC_SYMTAB:
                symtab_off = read_u32(data, p + 8)
                strtab_off = read_u32(data, p + 16)
            elif cmd == LC_DYSYMTAB:
                indirectsymoff = read_u32(data, p + 56)
            p += cmdsize

        # Find _objc_msgSend stub address
        objc_msgSend_vaddr = None
        stubs_key = ('__TEXT', '__stubs')
        if stubs_key in sections and symtab_off and indirectsymoff:
            stubs_foff, stubs_vaddr, stubs_size = sections[stubs_key]
            stub_sz    = 12
            stub_count = stubs_size // stub_sz
            reserved1  = sec_reserved1[stubs_key]
            for i in range(stub_count):
                idx = read_u32(data, indirectsymoff + (reserved1 + i) * 4)
                if idx >= 0x40000000:
                    continue
                str_idx  = read_u32(data, symtab_off + idx * 16)
                j        = strtab_off + str_idx
                sym_name = b''
                while j < len(data) and data[j] != 0:
                    sym_name += bytes([data[j]]); j += 1
                if sym_name == b'_objc_msgSend':
                    objc_msgSend_vaddr = stubs_vaddr + i * stub_sz
                    print(f"[+] _objc_msgSend stub vm: {objc_msgSend_vaddr:#x}")
                    break

        if not objc_msgSend_vaddr:
            print("[!] _objc_msgSend not found"); sys.exit(1)

        # Debug: list all sections
        print("[*] All sections:")
        for k in sorted(sections.keys()):
            print(f"    {k[0]},{k[1]}")

        # Methnames (try both spellings)
        mn_key = ('__TEXT', '__objc_methnames')
        if mn_key not in sections:
            mn_key = ('__TEXT', '__objc_methname')
        if mn_key not in sections:
            print("[!] __objc_methnames section not found"); sys.exit(1)
        mn_foff, mn_vaddr, mn_size = sections[mn_key]
        methnames_data = data[mn_foff:mn_foff + mn_size]

        ic_off = methnames_data.find(b'installClick\x00')
        ss_off = methnames_data.find(b'signSuccess\x00')

        if ic_off < 0 or ss_off < 0:
            print(f"[!] Missing selectors: ic={ic_off} ss={ss_off}"); sys.exit(1)

        # Selrefs
        selrefs_key = ('__DATA', '__objc_selrefs')
        if selrefs_key not in sections:
            selrefs_key = ('__DATA_CONST', '__objc_selrefs')
        sr_foff, sr_vaddr, sr_size = sections[selrefs_key]

        ic_str_vaddr = mn_vaddr + ic_off
        ss_str_vaddr = mn_vaddr + ss_off

        ic_selref_vaddr = ss_selref_vaddr = None
        for i in range(0, sr_size, 8):
            ptr = read_u64(data, sr_foff + i)
            if ptr == ic_str_vaddr: ic_selref_vaddr = sr_vaddr + i
            if ptr == ss_str_vaddr: ss_selref_vaddr = sr_vaddr + i

        print(f"[+] installClick selref: {ic_selref_vaddr:#x}" if ic_selref_vaddr else "[!] installClick selref not found")
        print(f"[+] signSuccess  selref: {ss_selref_vaddr:#x}" if ss_selref_vaddr else "[!] signSuccess selref not found")

        if not all([ic_selref_vaddr, ss_selref_vaddr]):
            print("[!] Missing required selrefs"); sys.exit(1)

        # Resolve __objc_const early (needed for IMP search)
        const_key = ('__DATA', '__objc_const')
        if const_key not in sections:
            const_key = ('__DATA_CONST', '__objc_const')
        oc_foff, oc_vaddr, oc_size = sections[const_key]

        # Find installClick IMP via class object chain
        # class_ro_t: flags(4),instanceStart(4),instanceSize(4),reserved(4),
        #   ivarLayout*(8), name*(8), baseMethods*(8), ...
        # name is at offset 24, baseMethods at offset 32

        installclick_imp_vaddr = None
        ic_str_vaddr = mn_vaddr + ic_off
        print(f"[*] installClick str vaddr: {ic_str_vaddr:#x}")

        classname = b'DASignProcessVC\x00'
        classname_foff = data.find(classname)
        print(f"[*] DASignProcessVC at file offset: {classname_foff:#x}")

        classname_vaddr = None
        for (seg, sect), (foff, vaddr, size) in sections.items():
            if foff <= classname_foff < foff + size:
                classname_vaddr = vaddr + (classname_foff - foff); break
        print(f"[*] DASignProcessVC vaddr: {classname_vaddr:#x}" if classname_vaddr else "[!] classname vaddr not found")

        if classname_vaddr:
            classname_bytes = struct.pack("<Q", classname_vaddr)
            # Search entire binary for class_ro_t with this name pointer at offset 24
            for search_foff in range(0, len(data) - 48, 8):
                if data[search_foff+24:search_foff+32] == classname_bytes:
                    base_methods_vm = read_u64(data, search_foff + 32)
                    print(f"[*] class_ro_t at {search_foff:#x}, baseMethods vm: {base_methods_vm:#x}")
                    if base_methods_vm:
                        ml_foff = vm_to_file(sections, base_methods_vm)
                        if ml_foff:
                            ml_flags = read_u32(data, ml_foff)
                            ml_count = read_u32(data, ml_foff + 4)
                            is_rel   = bool(ml_flags & 0x80000000)
                            print(f"[*] method list: flags={ml_flags:#x} count={ml_count} relative={is_rel}")
                            msz = 12 if is_rel else 24
                            for i in range(ml_count):
                                m_foff  = ml_foff + 8 + i * msz
                                m_vaddr = base_methods_vm + 8 + i * msz
                                if is_rel:
                                    n_off = read_i32(data, m_foff)
                                    n_target = (m_vaddr + n_off) & 0xFFFFFFFFFFFFFFFF
                                    # n_target may be selref or string
                                    match = (n_target == ic_selref_vaddr or n_target == ic_str_vaddr)
                                    if not match:
                                        # check if n_target is a selref pointing to ic_str
                                        nf = vm_to_file(sections, n_target)
                                        if nf and read_u64(data, nf) == ic_str_vaddr:
                                            match = True
                                    if match:
                                        i_off = read_i32(data, m_foff + 8)
                                        imp_va = (m_vaddr + 8 + i_off) & 0xFFFFFFFFFFFFFFFF
                                        # follow B stub if needed
                                        stubs_k = ('__TEXT', '__objc_stubs')
                                        if stubs_k in sections:
                                            sk_foff, sk_vaddr, sk_size = sections[stubs_k]
                                            if sk_vaddr <= imp_va < sk_vaddr + sk_size:
                                                sf = vm_to_file(sections, imp_va)
                                                instr = read_u32(data, sf)
                                                if (instr >> 26) == 0b000101:
                                                    imm26 = instr & 0x3FFFFFF
                                                    if imm26 & 0x2000000: imm26 |= ~0x3FFFFFF
                                                    imp_va = (imp_va + imm26 * 4) & 0xFFFFFFFFFFFFFFFF
                                        installclick_imp_vaddr = imp_va
                                        print(f"[+] installClick IMP vm: {imp_va:#x}")
                                        break
                                else:
                                    n_ptr = read_u64(data, m_foff)
                                    # absolute method_t: name is SEL (pointer to string), not selref
                                    if n_ptr == ic_str_vaddr or n_ptr == ic_selref_vaddr:
                                        installclick_imp_vaddr = read_u64(data, m_foff + 16)
                                        print(f"[+] installClick IMP vm (abs): {installclick_imp_vaddr:#x}")
                                        break
                    if installclick_imp_vaddr: break

        if not installclick_imp_vaddr:
            print("[!] installClick IMP not found"); sys.exit(1)

        installclick_imp_foff = vm_to_file(sections, installclick_imp_vaddr)
        print(f"[+] installClick IMP file offset: {installclick_imp_foff:#x}")

        # ── Find selectVC selref ─────────────────────────────────────────────
        sv_str_off = methnames_data.find(b'selectVC\x00')
        sv_selref_vaddr = None
        if sv_str_off >= 0:
            sv_str_vaddr = mn_vaddr + sv_str_off
            pos = 0
            while True:
                off2 = methnames_data.find(b'selectVC\x00', pos)
                if off2 < 0: break
                sv_va = mn_vaddr + off2
                sv_bytes = struct.pack("<Q", sv_va)
                for i in range(0, sr_size, 8):
                    if data[sr_foff+i:sr_foff+i+8] == sv_bytes:
                        sv_selref_vaddr = sr_vaddr + i
                        print(f"[+] selectVC selref: {sv_selref_vaddr:#x} -> str {sv_va:#x}")
                        break
                if sv_selref_vaddr: break
                pos = off2 + 1

        if not sv_selref_vaddr:
            print("[!] selectVC selref not found"); sys.exit(1)

        # ── Build patch ──────────────────────────────────────────────────────
        # ADR (PC-relative) + LDR (PC-rel) avoids __DATA address dependency.
        # Litpool appended at end of patch: sv_selref and ss_selref addresses.
        #
        # Layout (44 bytes total, litpool at installClick+36..51):
        #  0: STP  x29,x30,[sp,#-16]!
        #  4: ADD  x29,sp,#0
        #  8: ADR  x1,litpool      ; PC+28 bytes → sv_selref
        # 12: LDR  x1,[x1,#0]      ; load selector ptr (PC-rel via ADR)
        # 16: BL   objc_msgSend    ; x0 = [self selectVC]
        # 20: LDP  x29,x30,[sp],#16
        # 24: ADR  x1,litpool+8    ; PC+20 bytes → ss_selref
        # 28: LDR  x1,[x1,#0]
        # 32: B    objc_msgSend    ; tail call [selectVC signSuccess]
        # 36: LITPOOL: sv_selref_vaddr (8 bytes)
        # 44: LITPOOL: ss_selref_vaddr (8 bytes)

        base = installclick_imp_vaddr
        litpool_off = 36

        patch = bytearray()
        def pc(): return base + len(patch)

        patch += bytes([0xfd, 0x7d, 0xbf, 0xa9])  # STP X29,X30,[SP,#-16]!
        patch += bytes([0xfd, 0x03, 0x00, 0x91])  # ADD X29,SP,#0

        def adr_imm(rd, from_pc, to_va):
            off = to_va - from_pc
            imm = ((off >> 2) + 0x200000) & 0x1FFFFF
            immlo = imm & 3
            immhi = (imm >> 2) & 0x7FFFF
            return struct.pack("<I", 0x90000000 | (immlo << 29) | (immhi << 5) | rd)

        def ldr_pc_off(rt, off):
            off8 = (off // 8) & 0xFFF
            return struct.pack("<I", 0xF9400000 | (off8 << 10) | rt)

        def bl(pc_va, target_va):
            off   = (target_va - pc_va) & 0xFFFFFFFFFFFFFFFF
            imm26 = (off >> 2) & 0x3FFFFFF
            return struct.pack("<I", 0x94000000 | imm26)

        def b_tail(pc_va, target_va):
            off   = (target_va - pc_va) & 0xFFFFFFFFFFFFFFFF
            imm26 = (off >> 2) & 0x3FFFFFF
            return struct.pack("<I", 0x14000000 | imm26)

        def ldp_post(rt1, rt2, rn, imm):
            return struct.pack("<I", 0xA8C00000 | (((imm >> 3) & 0x7F) << 15) | (rt2 << 10) | (rn << 5) | rt1)

        X0,X1,X29,X30,SP = 0,1,29,30,31

        # ADR for sv_selref (litpool entry at base+36)
        adr1_off = len(patch)   # = 8
        adr1_pc  = base + adr1_off + 4  # PC = address of next instruction
        patch += adr_imm(X1, adr1_pc, base + litpool_off)

        ldr1_off = len(patch)   # = 12
        patch += ldr_pc_off(X1, 0)    # LDR X1,[X1,#0] — no extra offset

        patch += bl(pc(), objc_msgSend_vaddr)
        patch += ldp_post(X29, X30, SP, 16)

        # ADR for ss_selref (litpool entry at base+44)
        adr2_off = len(patch)   # = 24
        adr2_pc  = base + adr2_off + 4
        patch += adr_imm(X1, adr2_pc, base + litpool_off + 8)

        ldr2_off = len(patch)   # = 28
        patch += ldr_pc_off(X1, 0)    # LDR X1,[X1,#0]

        patch += b_tail(pc(), objc_msgSend_vaddr)

        # Litpool: sv_selref then ss_selref 64-bit addresses
        patch += struct.pack("<Q", sv_selref_vaddr)
        patch += struct.pack("<Q", ss_selref_vaddr)

        assert len(patch) == 52, f"patch size {len(patch)} (expected 52)"

        data[installclick_imp_foff:installclick_imp_foff + len(patch)] = patch
        print(f"[+] Wrote {len(patch)}-byte ARM64 patch at file offset {installclick_imp_foff:#x}")

        with open(binary_path, "wb") as f:
            f.write(data)
        print("[+] Binary patched successfully")
        PYEOF

    - name: Analyze signSuccess and verify patch
      run: |
        python3 << 'PYEOF'
        import struct

        binary_path = "temp/Payload/DumpApp.app/DumpApp"
        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        # 52-byte patch (44 code + 8 litpool)
        ic_foff = 0x27aa1c
        patch_bytes = data[ic_foff:ic_foff + 52]
        print(f"[*] Bytes at 0x{ic_foff:x}: {patch_bytes.hex()}")
        print(f"[*] Total patch area (52 bytes): {'OK' if len(patch_bytes) == 52 else f'WRONG ({len(patch_bytes)} bytes)'}")
        print(f"[*] Code bytes (0-35): {patch_bytes[:36].hex()}")
        print(f"[*] Litpool (36-51): {patch_bytes[36:52].hex()}")

        # Verify first instruction: STP X29,X30,[SP,#-16]! = 0xA9BF7DFD
        w0 = struct.unpack_from("<I", patch_bytes, 0)[0]
        print(f"[*] instr[0] = {w0:#010x}  {'OK (STP PRE)' if w0 == 0xA9BF7DFD else 'CHECK (expected 0xa9bf7dfd)'}")

        # Verify ADR[0] resolves to litpool entry at base+36
        # ADR at offset 8: PC = base + 12
        base_ic = 0x10027aa1c
        litpool_va = base_ic + 36
        w2 = struct.unpack_from("<I", patch_bytes, 8)[0]
        immlo = (w2 >> 29) & 3; immhi = (w2 >> 5) & 0x7FFFF
        adr_imm = ((immhi << 2) | immlo)
        if adr_imm & 0x100000: adr_imm -= 0x200000  # sign-extend
        adr1_target = base_ic + 12 + adr_imm
        print(f"[*] ADR[0] target={adr1_target:#x}  {'OK (litpool)' if adr1_target == litpool_va else 'MISMATCH (want litpool)'}")
        print(f"[*] LDR[0] at base+12 = {patch_bytes[12:16].hex()} (should be f9400001 = LDR X1,[X1,#0])")

        # Verify ADR[1] resolves to litpool entry at base+44
        w4 = struct.unpack_from("<I", patch_bytes, 24)[0]
        immlo2 = (w4 >> 29) & 3; immhi2 = (w4 >> 5) & 0x7FFFF
        adr_imm2 = ((immhi2 << 2) | immlo2)
        if adr_imm2 & 0x100000: adr_imm2 -= 0x200000
        adr2_target = base_ic + 28 + adr_imm2  # ADR at offset 24: PC = base+28
        litpool_va2 = base_ic + 44
        print(f"[*] ADR[1] target={adr2_target:#x}  {'OK (litpool+8)' if adr2_target == litpool_va2 else 'MISMATCH (want litpool+8)'}")

        # Verify litpool contents
        sv_selref = struct.unpack_from("<Q", patch_bytes, 36)[0]
        ss_selref = struct.unpack_from("<Q", patch_bytes, 44)[0]
        print(f"[*] litpool[0] sv_selref = {sv_selref:#x}  {'OK' if sv_selref == 0x100ee5670 else 'CHECK (want 0x100ee5670)'}")
        print(f"[*] litpool[8] ss_selref = {ss_selref:#x}  {'OK' if ss_selref == 0x100eecca0 else 'CHECK (want 0x100eecca0)'}")

        # 验证 selectVC getter 在 DASignProcessVC 的 method list 中存在
        def find_sections(data):
            sections = {}
            mh_off = 0
            for base in range(0, len(data) - 32, 8):
                if struct.unpack_from(">I", data, base)[0] == 0xFEEDFACE:
                    mh_off = base; break
            ncmds = struct.unpack_from("<I", data, mh_off + 16)[0]
            p = mh_off + 32
            for _ in range(ncmds):
                cmd = struct.unpack_from("<I", data, p)[0]
                csz = struct.unpack_from("<I", data, p + 4)[0]
                if cmd == 0x19:
                    ns = struct.unpack_from("<I", data, p + 64)[0]
                    sp = p + 72
                    for _ in range(ns):
                        sn = data[sp:sp+16].rstrip(b'\x00').decode()
                        sections[(data[p+8:p+24].rstrip(b'\x00').decode(), sn)] = (
                            struct.unpack_from("<I", data, sp+48)[0],
                            struct.unpack_from("<Q", data, sp+32)[0],
                            struct.unpack_from("<Q", data, sp+40)[0])
                        sp += 80
                p += csz
            return sections

        def vm_to_file(sections, va):
            for (seg,sect),(fo,vaddr,size) in sections.items():
                if vaddr <= va < vaddr + size:
                    return fo + (va - vaddr)
            return None

        sections = find_sections(data)
        mn_key = ('__TEXT','__objc_methnames') if ('__TEXT','__objc_methnames') in sections else ('__TEXT','__objc_methname')
        mn_fo, mn_va, mn_sz = sections[mn_key]

        sv_str_off = data[mn_fo:mn_fo+mn_sz].find(b'selectVC\x00')
        sv_str_va = mn_va + sv_str_off

        # DASignProcessVC class_ro_t at 0xdd6188, baseMethods at offset 32
        bm_vm = struct.unpack_from("<Q", data, 0xdd6188 + 32)[0]
        ml_f = vm_to_file(sections, bm_vm)
        ml_fl = struct.unpack_from("<I", data, ml_f)[0]
        ml_ct = struct.unpack_from("<I", data, ml_f + 4)[0]
        is_rel = bool(ml_fl & 0x80000000)
        msz = 12 if is_rel else 24
        found = False
        for i in range(ml_ct):
            mf = ml_f + 8 + i * msz
            mv = bm_vm + 8 + i * msz
            if is_rel:
                n_off = struct.unpack_from("<i", data, mf)[0]
                nt = (mv + n_off) & 0xFFFFFFFFFFFFFFFF
                nf = vm_to_file(sections, nt)
                match = (nt == sv_str_va) or (nf and struct.unpack_from("<Q", data, nf)[0] == sv_str_va)
            else:
                match = struct.unpack_from("<Q", data, mf)[0] == sv_str_va
            if match:
                imp = struct.unpack_from("<Q", data, mf + 16)[0] if not is_rel else (mv + 8 + struct.unpack_from("<i", data, mf + 8)[0]) & 0xFFFFFFFFFFFFFFFF
                print(f"[+] selectVC getter IMP in DASignProcessVC: {imp:#x}")
                found = True; break
        if not found:
            print("[!] selectVC getter NOT found in DASignProcessVC")
            # Try all class_ro_t entries
            for q in range(0, len(data) - 48, 8):
                if data[q+24:q+32] == b'DASignProcessVC\x00':
                    bm2 = struct.unpack_from("<Q", data, q + 32)[0]
                    ml2 = vm_to_file(sections, bm2)
                    if ml2:
                        ct2 = struct.unpack_from("<I", data, ml2 + 4)[0]
                        for i in range(ct2):
                            mf = ml2 + 8 + i * 24
                            if struct.unpack_from("<Q", data, mf)[0] == sv_str_va:
                                imp2 = struct.unpack_from("<Q", data, mf + 16)[0]
                                print(f"[+] selectVC getter at class_ro_t {q:#x}: IMP={imp2:#x}"); found = True
                    break
        print("[+] Verification complete")
        PYEOF

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
