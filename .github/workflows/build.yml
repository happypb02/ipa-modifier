name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary
      run: |
        python3 patch_binary.py 2>&1 | tee patch_output.log
        exit ${PIPESTATUS[0]}

    - name: Upload patch log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: patch-log
        path: patch_output.log
        retention-days: 1

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
