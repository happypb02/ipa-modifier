name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Write and run patch script
      run: |
        cat > patch_binary.py << 'PYEOF'
#!/usr/bin/env python3
import struct, sys

binary_path = "temp/Payload/DumpApp.app/DumpApp"

with open(binary_path, "rb") as f:
    data = bytearray(f.read())

def read_u32(data, off): return struct.unpack_from("<I", data, off)[0]
def read_u64(data, off): return struct.unpack_from("<Q", data, off)[0]

LC_SEGMENT_64 = 0x19
LC_SYMTAB     = 0x2
LC_DYSYMTAB   = 0xB

def find_sections(data, mh_off):
    sections = {}
    sec_reserved1 = {}
    ncmds = read_u32(data, mh_off + 16)
    p = mh_off + 32
    for _ in range(ncmds):
        cmd     = read_u32(data, p)
        cmdsize = read_u32(data, p + 4)
        if cmd == LC_SEGMENT_64:
            segname = data[p+8:p+24].rstrip(b'\x00').decode()
            nsects  = read_u32(data, p + 64)
            sp = p + 72
            for _ in range(nsects):
                sectname  = data[sp:sp+16].rstrip(b'\x00').decode()
                vm_addr   = read_u64(data, sp + 32)
                vm_size   = read_u64(data, sp + 40)
                file_off  = read_u32(data, sp + 48)
                reserved1 = read_u32(data, sp + 56)
                key = (segname, sectname)
                sections[key] = (file_off, vm_addr, vm_size)
                sec_reserved1[key] = reserved1
                sp += 80
        p += cmdsize
    return sections, sec_reserved1

def vm_to_file(sections, vm_addr):
    for (seg, sect), (foff, vaddr, size) in sections.items():
        if vaddr <= vm_addr < vaddr + size:
            return foff + (vm_addr - vaddr)
    return None

magic  = read_u32(data, 0)
mh_off = 0
if magic == struct.unpack(">I", b'\xCA\xFE\xBA\xBE')[0]:
    narch = struct.unpack_from(">I", data, 4)[0]
    for i in range(narch):
        base     = 8 + i * 20
        cpu_type = struct.unpack_from(">I", data, base)[0]
        if cpu_type == 0x0100000C:
            mh_off = struct.unpack_from(">I", data, base + 8)[0]
            break

sections, sec_reserved1 = find_sections(data, mh_off)
ncmds = read_u32(data, mh_off + 16)

symtab_off = strtab_off = indirectsymoff = None
p = mh_off + 32
for _ in range(ncmds):
    cmd     = read_u32(data, p)
    cmdsize = read_u32(data, p + 4)
    if cmd == LC_SYMTAB:
        symtab_off = read_u32(data, p + 8)
        strtab_off = read_u32(data, p + 16)
    elif cmd == LC_DYSYMTAB:
        indirectsymoff = read_u32(data, p + 56)
    p += cmdsize

objc_msgSend_vaddr = None
stubs_key = ('__TEXT', '__stubs')
if stubs_key in sections and symtab_off and indirectsymoff:
    stubs_foff, stubs_vaddr, stubs_size = sections[stubs_key]
    stub_sz    = 12
    stub_count = stubs_size // stub_sz
    reserved1  = sec_reserved1[stubs_key]
    for i in range(stub_count):
        idx = read_u32(data, indirectsymoff + (reserved1 + i) * 4)
        if idx >= 0x40000000:
            continue
        str_idx  = read_u32(data, symtab_off + idx * 16)
        j        = strtab_off + str_idx
        sym_name = b''
        while j < len(data) and data[j] != 0:
            sym_name += bytes([data[j]]); j += 1
        if sym_name == b'_objc_msgSend':
            objc_msgSend_vaddr = stubs_vaddr + i * stub_sz
            print("[+] _objc_msgSend stub vm: {0:#x}".format(objc_msgSend_vaddr))
            break

if not objc_msgSend_vaddr:
    print("[!] _objc_msgSend not found"); sys.exit(1)

mn_key = ('__TEXT', '__objc_methnames')
if mn_key not in sections:
    mn_key = ('__TEXT', '__objc_methname')
mn_foff, mn_vaddr, mn_size = sections[mn_key]
methnames_data = data[mn_foff:mn_foff + mn_size]

ic_off = methnames_data.find(b'installClick\x00')
ss_off = methnames_data.find(b'signSuccess\x00')
tb_off = methnames_data.find(b'tabBarController\x00')
si_off = methnames_data.find(b'setSelectedIndex:\x00')

if ic_off < 0 or ss_off < 0 or tb_off < 0 or si_off < 0:
    print("[!] Missing selectors"); sys.exit(1)

ic_str_vaddr = mn_vaddr + ic_off
ss_str_vaddr = mn_vaddr + ss_off
tb_str_vaddr = mn_vaddr + tb_off
si_str_vaddr = mn_vaddr + si_off

selrefs_key = ('__DATA', '__objc_selrefs')
if selrefs_key not in sections:
    selrefs_key = ('__DATA_CONST', '__objc_selrefs')
sr_foff, sr_vaddr, sr_size = sections[selrefs_key]

ic_selref_vaddr = ss_selref_vaddr = tb_selref_vaddr = si_selref_vaddr = sv_selref_vaddr = None
for i in range(0, sr_size, 8):
    ptr = read_u64(data, sr_foff + i)
    if ptr == ic_str_vaddr: ic_selref_vaddr = sr_vaddr + i
    if ptr == ss_str_vaddr: ss_selref_vaddr = sr_vaddr + i
    if ptr == tb_str_vaddr: tb_selref_vaddr = sr_vaddr + i
    if ptr == si_str_vaddr: si_selref_vaddr = sr_vaddr + i
    if sv_selref_vaddr is None:
        sv_off2 = methnames_data.find(b'selectVC\x00')
        if sv_off2 >= 0:
            sv_str_va2 = mn_vaddr + sv_off2
            if ptr == sv_str_va2:
                sv_selref_vaddr = sr_vaddr + i
                print("[+] selectVC selref: {0:#x}".format(sv_selref_vaddr))

print("[+] installClick selref: {0:#x}".format(ic_selref_vaddr) if ic_selref_vaddr else "[!] installClick selref not found")
print("[+] signSuccess  selref: {0:#x}".format(ss_selref_vaddr) if ss_selref_vaddr else "[!] signSuccess selref not found")
print("[+] tabBarController selref: {0:#x}".format(tb_selref_vaddr) if tb_selref_vaddr else "[!] tabBarController selref not found")
print("[+] setSelectedIndex: selref: {0:#x}".format(si_selref_vaddr) if si_selref_vaddr else "[!] setSelectedIndex: selref not found")

if not all([ic_selref_vaddr, ss_selref_vaddr, tb_selref_vaddr, si_selref_vaddr, sv_selref_vaddr]):
    print("[!] Missing required selrefs"); sys.exit(1)

classname = b'DASignProcessVC\x00'
classname_foff = data.find(classname)
classname_vaddr = None
for (seg, sect), (foff, vaddr, size) in sections.items():
    if foff <= classname_foff < foff + size:
        classname_vaddr = vaddr + (classname_foff - foff)
        break

if not classname_vaddr:
    print("[!] DASignProcessVC classname not found"); sys.exit(1)

classlist_key = ('__DATA', '__objc_classlist')
if classlist_key not in sections:
    classlist_key = ('__DATA_CONST', '__objc_classlist')
cl_foff, cl_vaddr, cl_size = sections[classlist_key]

class_data_vaddr = None
for i in range(0, cl_size, 8):
    class_ptr = read_u64(data, cl_foff + i)
    if class_ptr == 0:
        continue
    class_foff = vm_to_file(sections, class_ptr)
    if class_foff is None:
        continue
    data_ptr = read_u64(data, class_foff + 32)
    data_foff = vm_to_file(sections, data_ptr)
    if data_foff is None:
        continue
    name_ptr = read_u64(data, data_foff + 24)
    if name_ptr == classname_vaddr:
        class_data_vaddr = data_ptr
        break

if not class_data_vaddr:
    print("[!] DASignProcessVC class_ro_t not found"); sys.exit(1)

class_data_foff = vm_to_file(sections, class_data_vaddr)
baseMethods_ptr = read_u64(data, class_data_foff + 32)

if not baseMethods_ptr:
    print("[!] baseMethods is NULL"); sys.exit(1)

baseMethods_foff = vm_to_file(sections, baseMethods_ptr)
method_count = read_u32(data, baseMethods_foff + 4)

installclick_imp_vaddr = None
for i in range(method_count):
    method_off = baseMethods_foff + 8 + i * 24
    name_ptr = read_u64(data, method_off)
    if name_ptr == ic_str_vaddr:
        installclick_imp_vaddr = read_u64(data, method_off + 16)
        print("[+] installClick IMP vm: {0:#x}".format(installclick_imp_vaddr))
        break

if not installclick_imp_vaddr:
    print("[!] installClick IMP not found"); sys.exit(1)

installclick_imp_foff = vm_to_file(sections, installclick_imp_vaddr)
print("[+] installClick IMP file offset: {0:#x}".format(installclick_imp_foff))

base = installclick_imp_vaddr

def adr_imm(rd, from_va, to_va):
    pc   = from_va + 4
    imm  = to_va - pc
    imm  = (imm + 0x200000) & 0x1FFFFF
    return struct.pack("<I", 0x90000000 | ((imm & 3) << 29) | ((imm >> 2) << 5) | rd)

def bl_insn(from_va, to_va):
    offset = (to_va - from_va) >> 2
    offset &= 0x3FFFFFF
    return struct.pack("<I", 0x94000000 | offset)

def b_insn(from_va, to_va):
    offset = (to_va - from_va) >> 2
    offset &= 0x3FFFFFF
    return struct.pack("<I", 0x14000000 | offset)

litpool_va = base + 80

patch = bytearray()
patch += bytes([0xa9, 0xbf, 0x7b, 0xfd])
patch += bytes([0xa9, 0x03, 0x53, 0xf3])
patch += bytes([0x91, 0x00, 0x3f, 0xfd])

patch += adr_imm(1, base+12, litpool_va)
patch += bytes([0xf9, 0x40, 0x00, 0x01])
patch += bl_insn(base+20, objc_msgSend_vaddr)
patch += bytes([0xaa, 0x00, 0x03, 0xf3])

patch += adr_imm(1, base+28, litpool_va+8)
patch += bytes([0xf9, 0x40, 0x00, 0x01])
patch += bl_insn(base+36, objc_msgSend_vaddr)

patch += bytes([0xd2, 0x80, 0x00, 0x02])
patch += adr_imm(1, base+44, litpool_va+16)
patch += bytes([0xf9, 0x40, 0x00, 0x01])
patch += bl_insn(base+52, objc_msgSend_vaddr)

patch += bytes([0xaa, 0x1d, 0x03, 0xe0])
patch += bytes([0xa9, 0x43, 0x53, 0xf3])
patch += bytes([0xa8, 0xc1, 0x7b, 0xfd])

patch += adr_imm(1, base+68, litpool_va+24)
patch += bytes([0xf9, 0x40, 0x00, 0x01])
patch += b_insn(base+76, objc_msgSend_vaddr)

assert len(patch) == 80, "code part is {0} bytes (expected 80)".format(len(patch))

patch += struct.pack("<Q", sv_selref_vaddr)
patch += struct.pack("<Q", tb_selref_vaddr)
patch += struct.pack("<Q", si_selref_vaddr)
patch += struct.pack("<Q", ss_selref_vaddr)

assert len(patch) == 112, "patch size {0} (expected 112)".format(len(patch))

data[installclick_imp_foff:installclick_imp_foff + 112] = patch
print("[+] Wrote {0}-byte ARM64 patch at file offset {1:#x}".format(len(patch), installclick_imp_foff))

with open(binary_path, "wb") as f:
    f.write(data)
print("[+] Binary patched successfully")
PYEOF
        python3 patch_binary.py

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
