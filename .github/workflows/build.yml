name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Compile hook dylib
      run: |
        clang -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework UIKit \
          -dynamiclib -o libhook.dylib hook.m

    - name: Install insert_dylib
      run: |
        git clone https://github.com/Tyilo/insert_dylib.git
        cd insert_dylib
        make
        sudo cp insert_dylib /usr/local/bin/

    - name: Inject dylib
      run: |
        mkdir -p temp/Payload/DumpApp.app/Frameworks
        cp libhook.dylib temp/Payload/DumpApp.app/Frameworks/
        insert_dylib @executable_path/Frameworks/libhook.dylib temp/Payload/DumpApp.app/DumpApp --inplace --weak

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
