name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary with Python
      run: |
        python3 << 'PYEOF'
        import struct, os, sys

        binary_path = "temp/Payload/DumpApp.app/DumpApp"

        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        print(f"[*] Binary size: {len(data)} bytes")

        # 搜索 installClick 方法的实现
        # 在 Mach-O __TEXT,__objc_methnames 段中找到方法名
        target_method = b"installClick\x00"
        pos = data.find(target_method)
        if pos != -1:
            print(f"[+] Found 'installClick' at offset {pos:#x}")
        else:
            print("[!] 'installClick' not found")

        # 搜索 DASignProcessVC 类名
        target_class = b"DASignProcessVC\x00"
        pos2 = data.find(target_class)
        if pos2 != -1:
            print(f"[+] Found 'DASignProcessVC' at offset {pos2:#x}")
        else:
            print("[!] 'DASignProcessVC' not found")

        # 搜索 DASelectAppVC 类名
        target_class2 = b"DASelectAppVC\x00"
        pos3 = data.find(target_class2)
        if pos3 != -1:
            print(f"[+] Found 'DASelectAppVC' at offset {pos3:#x}")
        else:
            print("[!] 'DASelectAppVC' not found")

        # 搜索所有包含 "install" 的方法名
        print("\n[*] Methods containing 'install':")
        search = b"install"
        start = 0
        while True:
            p = data.find(search, start)
            if p == -1:
                break
            # 找到字符串的开始（向前找 \x00）
            s = p
            while s > 0 and data[s-1] != 0:
                s -= 1
            # 找到字符串的结束
            e = p
            while e < len(data) and data[e] != 0:
                e += 1
            method = data[s:e].decode('utf-8', errors='ignore')
            if method and len(method) < 100:
                print(f"  offset {s:#x}: {method}")
            start = e + 1

        # 搜索所有包含 "Select" 的方法名
        print("\n[*] Methods containing 'Select':")
        search = b"Select"
        start = 0
        count = 0
        while count < 20:
            p = data.find(search, start)
            if p == -1:
                break
            s = p
            while s > 0 and data[s-1] != 0:
                s -= 1
            e = p
            while e < len(data) and data[e] != 0:
                e += 1
            method = data[s:e].decode('utf-8', errors='ignore')
            if method and len(method) < 100 and method.isprintable():
                print(f"  offset {s:#x}: {method}")
                count += 1
            start = e + 1

        print("\n[*] Analysis complete")
        PYEOF

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
