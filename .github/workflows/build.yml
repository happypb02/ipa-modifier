name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Deep analysis of DASelectAppVC and DASignProcessVC
      run: |
        python3 << 'PYEOF'
        import struct, re

        with open("temp/Payload/DumpApp.app/DumpApp", "rb") as f:
            data = f.read()

        def find_strings_containing(keyword):
            results = []
            kb = keyword.encode()
            start = 0
            while True:
                p = data.find(kb, start)
                if p == -1:
                    break
                s = p
                while s > 0 and data[s-1] != 0:
                    s -= 1
                e = p
                while e < len(data) and data[e] != 0:
                    e += 1
                method = data[s:e].decode('utf-8', errors='ignore')
                if method and len(method) < 150:
                    results.append((s, method))
                start = e + 1
            return results

        # DASelectAppVC 的所有方法
        print("=== DASelectAppVC methods ===")
        for off, m in find_strings_containing("DASelectAppVC"):
            print(f"  {off:#x}: {m}")

        # 找 segment / tab 相关方法
        print("\n=== segment related ===")
        for off, m in find_strings_containing("segment"):
            if len(m) < 80:
                print(f"  {off:#x}: {m}")

        # 找 signed / sign 相关方法
        print("\n=== sign related methods ===")
        for off, m in find_strings_containing("sign"):
            if len(m) < 80 and not m.startswith("T@") and not m.startswith("_"):
                print(f"  {off:#x}: {m}")

        # 找 selectVC 属性
        print("\n=== selectVC related ===")
        for off, m in find_strings_containing("selectVC"):
            print(f"  {off:#x}: {m}")

        # 找 setSelect / switchTo / switchTab 相关
        print("\n=== switch/tab methods ===")
        for kw in ["setSelect", "switchTo", "switchTab", "showSigned", "signedList", "signList", "已定制", "customized"]:
            for off, m in find_strings_containing(kw):
                if len(m) < 100:
                    print(f"  [{kw}] {off:#x}: {m}")

        PYEOF

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
