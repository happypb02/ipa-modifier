name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary
      run: |
        python3 << 'PYEOF'
        import struct, sys

        binary_path = "temp/Payload/DumpApp.app/DumpApp"

        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        def read_u32(data, off): return struct.unpack_from("<I", data, off)[0]
        def read_u64(data, off): return struct.unpack_from("<Q", data, off)[0]
        def read_i32(data, off): return struct.unpack_from("<i", data, off)[0]

        LC_SEGMENT_64 = 0x19
        LC_SYMTAB     = 0x2
        LC_DYSYMTAB   = 0xB

        def find_sections(data, mh_off):
            sections = {}
            sec_reserved1 = {}
            ncmds = read_u32(data, mh_off + 16)
            p = mh_off + 32
            for _ in range(ncmds):
                cmd     = read_u32(data, p)
                cmdsize = read_u32(data, p + 4)
                if cmd == LC_SEGMENT_64:
                    segname = data[p+8:p+24].rstrip(b'\x00').decode()
                    nsects  = read_u32(data, p + 64)
                    sp = p + 72
                    for _ in range(nsects):
                        sectname  = data[sp:sp+16].rstrip(b'\x00').decode()
                        vm_addr   = read_u64(data, sp + 32)
                        vm_size   = read_u64(data, sp + 40)
                        file_off  = read_u32(data, sp + 48)
                        reserved1 = read_u32(data, sp + 56)
                        key = (segname, sectname)
                        sections[key] = (file_off, vm_addr, vm_size)
                        sec_reserved1[key] = reserved1
                        sp += 80
                p += cmdsize
            return sections, sec_reserved1

        def vm_to_file(sections, vm_addr):
            for (seg, sect), (foff, vaddr, size) in sections.items():
                if vaddr <= vm_addr < vaddr + size:
                    return foff + (vm_addr - vaddr)
            return None

        # Locate ARM64 slice
        magic  = read_u32(data, 0)
        mh_off = 0
        if magic == struct.unpack(">I", b'\xCA\xFE\xBA\xBE')[0]:
            narch = struct.unpack_from(">I", data, 4)[0]
            for i in range(narch):
                base     = 8 + i * 20
                cpu_type = struct.unpack_from(">I", data, base)[0]
                if cpu_type == 0x0100000C:
                    mh_off = struct.unpack_from(">I", data, base + 8)[0]
                    break

        sections, sec_reserved1 = find_sections(data, mh_off)
        ncmds = read_u32(data, mh_off + 16)
        print(f"[*] mh_off={mh_off:#x}, sections={len(sections)}")

        # Parse LC_SYMTAB / LC_DYSYMTAB
        symtab_off = strtab_off = indirectsymoff = None
        p = mh_off + 32
        for _ in range(ncmds):
            cmd     = read_u32(data, p)
            cmdsize = read_u32(data, p + 4)
            if cmd == LC_SYMTAB:
                symtab_off = read_u32(data, p + 8)
                strtab_off = read_u32(data, p + 16)
            elif cmd == LC_DYSYMTAB:
                indirectsymoff = read_u32(data, p + 56)
            p += cmdsize

        # Find _objc_msgSend stub address
        objc_msgSend_vaddr = None
        stubs_key = ('__TEXT', '__stubs')
        if stubs_key in sections and symtab_off and indirectsymoff:
            stubs_foff, stubs_vaddr, stubs_size = sections[stubs_key]
            stub_sz    = 12
            stub_count = stubs_size // stub_sz
            reserved1  = sec_reserved1[stubs_key]
            for i in range(stub_count):
                idx = read_u32(data, indirectsymoff + (reserved1 + i) * 4)
                if idx >= 0x40000000:
                    continue
                str_idx  = read_u32(data, symtab_off + idx * 16)
                j        = strtab_off + str_idx
                sym_name = b''
                while j < len(data) and data[j] != 0:
                    sym_name += bytes([data[j]]); j += 1
                if sym_name == b'_objc_msgSend':
                    objc_msgSend_vaddr = stubs_vaddr + i * stub_sz
                    print(f"[+] _objc_msgSend stub vm: {objc_msgSend_vaddr:#x}")
                    break

        if not objc_msgSend_vaddr:
            print("[!] _objc_msgSend not found"); sys.exit(1)

        # Debug: list all sections
        print("[*] All sections:")
        for k in sorted(sections.keys()):
            print(f"    {k[0]},{k[1]}")

        # Methnames (try both spellings)
        mn_key = ('__TEXT', '__objc_methnames')
        if mn_key not in sections:
            mn_key = ('__TEXT', '__objc_methname')
        if mn_key not in sections:
            print("[!] __objc_methnames section not found"); sys.exit(1)
        mn_foff, mn_vaddr, mn_size = sections[mn_key]
        methnames_data = data[mn_foff:mn_foff + mn_size]

        ic_off = methnames_data.find(b'installClick\x00')
        ss_off = methnames_data.find(b'signSuccess\x00')
        sv_off = methnames_data.find(b'selectVC\x00')

        if ic_off < 0 or ss_off < 0 or sv_off < 0:
            print(f"[!] Missing selectors: ic={ic_off} ss={ss_off} sv={sv_off}"); sys.exit(1)

        # Selrefs
        selrefs_key = ('__DATA', '__objc_selrefs')
        if selrefs_key not in sections:
            selrefs_key = ('__DATA_CONST', '__objc_selrefs')
        sr_foff, sr_vaddr, sr_size = sections[selrefs_key]

        ic_str_vaddr = mn_vaddr + ic_off
        ss_str_vaddr = mn_vaddr + ss_off
        sv_str_vaddr = mn_vaddr + sv_off

        ic_selref_vaddr = ss_selref_vaddr = None
        for i in range(0, sr_size, 8):
            ptr = read_u64(data, sr_foff + i)
            if ptr == ic_str_vaddr: ic_selref_vaddr = sr_vaddr + i
            if ptr == ss_str_vaddr: ss_selref_vaddr = sr_vaddr + i

        print(f"[+] installClick selref: {ic_selref_vaddr:#x}" if ic_selref_vaddr else "[!] installClick selref not found")
        print(f"[+] signSuccess  selref: {ss_selref_vaddr:#x}" if ss_selref_vaddr else "[!] signSuccess selref not found")

        if not all([ic_selref_vaddr, ss_selref_vaddr]):
            print("[!] Missing required selrefs"); sys.exit(1)

        # Resolve __objc_const early (needed for both ivar search and IMP search)
        const_key = ('__DATA', '__objc_const')
        if const_key not in sections:
            const_key = ('__DATA_CONST', '__objc_const')
        oc_foff, oc_vaddr, oc_size = sections[const_key]

        # Find _selectVC ivar offset (compiler uses direct ivar access, not objc_msgSend)
        # ivar_t: offset_ptr(8), name_ptr(8), type_ptr(8), align(4), size(4) = 32 bytes
        selectvc_ivar_offset = None
        ivar_key = ('__DATA', '__objc_ivar')
        if ivar_key in sections:
            iv_foff, iv_vaddr, iv_size = sections[ivar_key]
            # Search for "_selectVC" name in entire binary, then find ivar_t referencing it
            for name_candidate in [b'_selectVC\x00', b'selectVC\x00']:
                pos = 0
                while True:
                    pos = data.find(name_candidate, pos)
                    if pos < 0: break
                    # Find vm address of this string
                    name_vaddr = None
                    for (seg, sect), (foff, vaddr, size) in sections.items():
                        if foff <= pos < foff + size:
                            name_vaddr = vaddr + (pos - foff); break
                    if name_vaddr:
                        name_bytes = struct.pack("<Q", name_vaddr)
                        # Search __objc_const for ivar_t with this name_ptr
                        q = oc_foff
                        while q < oc_foff + oc_size - 32:
                            if data[q+8:q+16] == name_bytes:
                                off_ptr_vm = read_u64(data, q)
                                off_ptr_file = vm_to_file(sections, off_ptr_vm)
                                if off_ptr_file:
                                    selectvc_ivar_offset = read_u32(data, off_ptr_file)
                                    print(f"[+] selectVC ivar offset: {selectvc_ivar_offset}")
                                break
                            q += 1
                    if selectvc_ivar_offset is not None: break
                    pos += 1
                if selectvc_ivar_offset is not None: break

        if selectvc_ivar_offset is None:
            print("[!] selectVC ivar offset not found"); sys.exit(1)

        # Find installClick IMP via class object chain
        # class_ro_t layout (64-bit): flags(4), instanceStart(4), instanceSize(4),
        #   reserved(4), ivarLayout(8), name*(8), baseMethods*(8), ...
        # name is at offset 24, baseMethods at offset 32

        installclick_imp_vaddr = None
        ic_str_vaddr = mn_vaddr + ic_off
        print(f"[*] installClick str vaddr: {ic_str_vaddr:#x}")

        classname = b'DASignProcessVC\x00'
        classname_foff = data.find(classname)
        print(f"[*] DASignProcessVC at file offset: {classname_foff:#x}")

        classname_vaddr = None
        for (seg, sect), (foff, vaddr, size) in sections.items():
            if foff <= classname_foff < foff + size:
                classname_vaddr = vaddr + (classname_foff - foff); break
        print(f"[*] DASignProcessVC vaddr: {classname_vaddr:#x}" if classname_vaddr else "[!] classname vaddr not found")

        if classname_vaddr:
            classname_bytes = struct.pack("<Q", classname_vaddr)
            # Search entire binary for class_ro_t with this name pointer at offset 24
            for search_foff in range(0, len(data) - 48, 8):
                if data[search_foff+24:search_foff+32] == classname_bytes:
                    base_methods_vm = read_u64(data, search_foff + 32)
                    print(f"[*] class_ro_t at {search_foff:#x}, baseMethods vm: {base_methods_vm:#x}")
                    if base_methods_vm:
                        ml_foff = vm_to_file(sections, base_methods_vm)
                        if ml_foff:
                            ml_flags = read_u32(data, ml_foff)
                            ml_count = read_u32(data, ml_foff + 4)
                            is_rel   = bool(ml_flags & 0x80000000)
                            print(f"[*] method list: flags={ml_flags:#x} count={ml_count} relative={is_rel}")
                            msz = 12 if is_rel else 24
                            for i in range(ml_count):
                                m_foff  = ml_foff + 8 + i * msz
                                m_vaddr = base_methods_vm + 8 + i * msz
                                if is_rel:
                                    n_off = read_i32(data, m_foff)
                                    n_target = (m_vaddr + n_off) & 0xFFFFFFFFFFFFFFFF
                                    # n_target may be selref or string
                                    match = (n_target == ic_selref_vaddr or n_target == ic_str_vaddr)
                                    if not match:
                                        # check if n_target is a selref pointing to ic_str
                                        nf = vm_to_file(sections, n_target)
                                        if nf and read_u64(data, nf) == ic_str_vaddr:
                                            match = True
                                    if match:
                                        i_off = read_i32(data, m_foff + 8)
                                        imp_va = (m_vaddr + 8 + i_off) & 0xFFFFFFFFFFFFFFFF
                                        # follow B stub if needed
                                        stubs_k = ('__TEXT', '__objc_stubs')
                                        if stubs_k in sections:
                                            sk_foff, sk_vaddr, sk_size = sections[stubs_k]
                                            if sk_vaddr <= imp_va < sk_vaddr + sk_size:
                                                sf = vm_to_file(sections, imp_va)
                                                instr = read_u32(data, sf)
                                                if (instr >> 26) == 0b000101:
                                                    imm26 = instr & 0x3FFFFFF
                                                    if imm26 & 0x2000000: imm26 |= ~0x3FFFFFF
                                                    imp_va = (imp_va + imm26 * 4) & 0xFFFFFFFFFFFFFFFF
                                        installclick_imp_vaddr = imp_va
                                        print(f"[+] installClick IMP vm: {imp_va:#x}")
                                        break
                                else:
                                    n_ptr = read_u64(data, m_foff)
                                    # absolute method_t: name is SEL (pointer to string), not selref
                                    if n_ptr == ic_str_vaddr or n_ptr == ic_selref_vaddr:
                                        installclick_imp_vaddr = read_u64(data, m_foff + 16)
                                        print(f"[+] installClick IMP vm (abs): {installclick_imp_vaddr:#x}")
                                        break
                    if installclick_imp_vaddr: break

        if not installclick_imp_vaddr:
            print("[!] installClick IMP not found"); sys.exit(1)

        installclick_imp_foff = vm_to_file(sections, installclick_imp_vaddr)
        print(f"[+] installClick IMP file offset: {installclick_imp_foff:#x}")

        # ── ARM64 instruction encoders ──────────────────────────────────────

        def stp_pre(rt1, rt2, rn, imm):   # STP Xt1,Xt2,[Xn,#imm]!
            imm7 = (imm // 8) & 0x7F
            return struct.pack("<I", 0xA9800000 | (imm7 << 15) | (rt2 << 10) | (rn << 5) | rt1)

        def ldp_post(rt1, rt2, rn, imm):  # LDP Xt1,Xt2,[Xn],#imm
            imm7 = (imm // 8) & 0x7F
            return struct.pack("<I", 0xA8C00000 | (imm7 << 15) | (rt2 << 10) | (rn << 5) | rt1)

        def add_imm(rd, rn, imm):          # ADD Xd,Xn,#imm
            return struct.pack("<I", 0x91000000 | ((imm & 0xFFF) << 10) | (rn << 5) | rd)

        def adrp(rd, pc_va, target_va):    # ADRP Xd, page
            pc_page  = pc_va & ~0xFFF
            tgt_page = target_va & ~0xFFF
            imm      = ((tgt_page - pc_page) >> 12) & 0x1FFFFF
            immlo    = imm & 3
            immhi    = (imm >> 2) & 0x7FFFF
            return struct.pack("<I", 0x90000000 | (immlo << 29) | (immhi << 5) | rd)

        def ldr_imm(rt, rn, imm):          # LDR Xt,[Xn,#imm]  (imm multiple of 8)
            imm12 = (imm // 8) & 0xFFF
            return struct.pack("<I", 0xF9400000 | (imm12 << 10) | (rn << 5) | rt)

        def bl(pc_va, target_va):          # BL target
            off   = (target_va - pc_va) & 0xFFFFFFFF
            imm26 = (off >> 2) & 0x3FFFFFF
            return struct.pack("<I", 0x94000000 | imm26)

        def ret():
            return struct.pack("<I", 0xD65F03C0)

        # ── Build patch ─────────────────────────────────────────────────────
        # Goal: [self->_selectVC signSuccess]
        #
        # STP  x29, x30, [sp, #-16]!
        # ADD  x29, sp,  #0
        # LDR  x0,  [x0, #selectvc_ivar_offset]  ; x0 = self->_selectVC
        # ADRP x1,  page(ss_selref)
        # LDR  x1,  [x1, off(ss_selref)]
        # BL   _objc_msgSend          ; [selectVC signSuccess]
        # LDP  x29, x30, [sp], #16
        # RET

        X0,X1,X29,X30,SP = 0,1,29,30,31
        base = installclick_imp_vaddr
        patch = bytearray()

        def pc(): return base + len(patch)

        patch += stp_pre(X29, X30, SP, -16)
        patch += add_imm(X29, SP, 0)

        # LDR x0, [x0, #ivar_offset]  — load self->_selectVC
        patch += ldr_imm(X0, X0, selectvc_ivar_offset)

        patch += adrp(X1, pc(), ss_selref_vaddr)
        patch += ldr_imm(X1, X1, ss_selref_vaddr & 0xFFF)

        patch += bl(pc(), objc_msgSend_vaddr)

        patch += ldp_post(X29, X30, SP, 16)
        patch += ret()

        assert len(patch) == 32, f"patch size {len(patch)}"

        data[installclick_imp_foff:installclick_imp_foff + len(patch)] = patch
        print(f"[+] Wrote {len(patch)}-byte ARM64 patch at file offset {installclick_imp_foff:#x}")

        with open(binary_path, "wb") as f:
            f.write(data)
        print("[+] Binary patched successfully")
        PYEOF

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
