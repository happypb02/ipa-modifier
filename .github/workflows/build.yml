name: Build Modified IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract IPA
      run: unzip -q 2.ipa -d temp

    - name: Patch binary
      run: |
        python3 << 'PYEOF'
        import struct, sys

        binary_path = "temp/Payload/DumpApp.app/DumpApp"

        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        def read_u32(data, off): return struct.unpack_from("<I", data, off)[0]
        def read_u64(data, off): return struct.unpack_from("<Q", data, off)[0]
        def read_i32(data, off): return struct.unpack_from("<i", data, off)[0]

        LC_SEGMENT_64 = 0x19
        LC_SYMTAB     = 0x2
        LC_DYSYMTAB   = 0xB

        def find_sections(data, mh_off):
            sections = {}
            sec_reserved1 = {}
            ncmds = read_u32(data, mh_off + 16)
            p = mh_off + 32
            for _ in range(ncmds):
                cmd     = read_u32(data, p)
                cmdsize = read_u32(data, p + 4)
                if cmd == LC_SEGMENT_64:
                    segname = data[p+8:p+24].rstrip(b'\x00').decode()
                    nsects  = read_u32(data, p + 64)
                    sp = p + 72
                    for _ in range(nsects):
                        sectname  = data[sp:sp+16].rstrip(b'\x00').decode()
                        vm_addr   = read_u64(data, sp + 32)
                        vm_size   = read_u64(data, sp + 40)
                        file_off  = read_u32(data, sp + 48)
                        reserved1 = read_u32(data, sp + 56)
                        key = (segname, sectname)
                        sections[key] = (file_off, vm_addr, vm_size)
                        sec_reserved1[key] = reserved1
                        sp += 80
                p += cmdsize
            return sections, sec_reserved1

        def vm_to_file(sections, vm_addr):
            for (seg, sect), (foff, vaddr, size) in sections.items():
                if vaddr <= vm_addr < vaddr + size:
                    return foff + (vm_addr - vaddr)
            return None

        # Locate ARM64 slice
        magic  = read_u32(data, 0)
        mh_off = 0
        if magic == struct.unpack(">I", b'\xCA\xFE\xBA\xBE')[0]:
            narch = struct.unpack_from(">I", data, 4)[0]
            for i in range(narch):
                base     = 8 + i * 20
                cpu_type = struct.unpack_from(">I", data, base)[0]
                if cpu_type == 0x0100000C:
                    mh_off = struct.unpack_from(">I", data, base + 8)[0]
                    break

        sections, sec_reserved1 = find_sections(data, mh_off)
        ncmds = read_u32(data, mh_off + 16)
        print(f"[*] mh_off={mh_off:#x}, sections={len(sections)}")

        # Parse LC_SYMTAB / LC_DYSYMTAB
        symtab_off = strtab_off = indirectsymoff = None
        p = mh_off + 32
        for _ in range(ncmds):
            cmd     = read_u32(data, p)
            cmdsize = read_u32(data, p + 4)
            if cmd == LC_SYMTAB:
                symtab_off = read_u32(data, p + 8)
                strtab_off = read_u32(data, p + 16)
            elif cmd == LC_DYSYMTAB:
                indirectsymoff = read_u32(data, p + 56)
            p += cmdsize

        # Find _objc_msgSend stub address
        objc_msgSend_vaddr = None
        stubs_key = ('__TEXT', '__stubs')
        if stubs_key in sections and symtab_off and indirectsymoff:
            stubs_foff, stubs_vaddr, stubs_size = sections[stubs_key]
            stub_sz    = 12
            stub_count = stubs_size // stub_sz
            reserved1  = sec_reserved1[stubs_key]
            for i in range(stub_count):
                idx = read_u32(data, indirectsymoff + (reserved1 + i) * 4)
                if idx >= 0x40000000:
                    continue
                str_idx  = read_u32(data, symtab_off + idx * 16)
                j        = strtab_off + str_idx
                sym_name = b''
                while j < len(data) and data[j] != 0:
                    sym_name += bytes([data[j]]); j += 1
                if sym_name == b'_objc_msgSend':
                    objc_msgSend_vaddr = stubs_vaddr + i * stub_sz
                    print(f"[+] _objc_msgSend stub vm: {objc_msgSend_vaddr:#x}")
                    break

        if not objc_msgSend_vaddr:
            print("[!] _objc_msgSend not found"); sys.exit(1)

        # Debug: list all sections
        print("[*] All sections:")
        for k in sorted(sections.keys()):
            print(f"    {k[0]},{k[1]}")

        # Methnames (try both spellings)
        mn_key = ('__TEXT', '__objc_methnames')
        if mn_key not in sections:
            mn_key = ('__TEXT', '__objc_methname')
        if mn_key not in sections:
            print("[!] __objc_methnames section not found"); sys.exit(1)
        mn_foff, mn_vaddr, mn_size = sections[mn_key]
        methnames_data = data[mn_foff:mn_foff + mn_size]

        ic_off = methnames_data.find(b'installClick\x00')
        ss_off = methnames_data.find(b'signSuccess\x00')
        sv_off = methnames_data.find(b'selectVC\x00')

        if ic_off < 0 or ss_off < 0 or sv_off < 0:
            print(f"[!] Missing selectors: ic={ic_off} ss={ss_off} sv={sv_off}"); sys.exit(1)

        # Selrefs
        selrefs_key = ('__DATA', '__objc_selrefs')
        if selrefs_key not in sections:
            selrefs_key = ('__DATA_CONST', '__objc_selrefs')
        sr_foff, sr_vaddr, sr_size = sections[selrefs_key]

        ic_str_vaddr = mn_vaddr + ic_off
        ss_str_vaddr = mn_vaddr + ss_off
        sv_str_vaddr = mn_vaddr + sv_off

        ic_selref_vaddr = ss_selref_vaddr = None
        for i in range(0, sr_size, 8):
            ptr = read_u64(data, sr_foff + i)
            if ptr == ic_str_vaddr: ic_selref_vaddr = sr_vaddr + i
            if ptr == ss_str_vaddr: ss_selref_vaddr = sr_vaddr + i

        print(f"[+] installClick selref: {ic_selref_vaddr:#x}" if ic_selref_vaddr else "[!] installClick selref not found")
        print(f"[+] signSuccess  selref: {ss_selref_vaddr:#x}" if ss_selref_vaddr else "[!] signSuccess selref not found")

        if not all([ic_selref_vaddr, ss_selref_vaddr]):
            print("[!] Missing required selrefs"); sys.exit(1)

        # Resolve __objc_const early (needed for both ivar search and IMP search)
        const_key = ('__DATA', '__objc_const')
        if const_key not in sections:
            const_key = ('__DATA_CONST', '__objc_const')
        oc_foff, oc_vaddr, oc_size = sections[const_key]

        # Find _selectVC ivar offset (compiler uses direct ivar access, not objc_msgSend)
        # ivar_t: offset_ptr(8), name_ptr(8), type_ptr(8), align(4), size(4) = 32 bytes
        selectvc_ivar_offset = None
        ivar_key = ('__DATA', '__objc_ivar')
        if ivar_key in sections:
            iv_foff, iv_vaddr, iv_size = sections[ivar_key]
            # Search for "_selectVC" name in entire binary, then find ivar_t referencing it
            for name_candidate in [b'_selectVC\x00', b'selectVC\x00']:
                pos = 0
                while True:
                    pos = data.find(name_candidate, pos)
                    if pos < 0: break
                    # Find vm address of this string
                    name_vaddr = None
                    for (seg, sect), (foff, vaddr, size) in sections.items():
                        if foff <= pos < foff + size:
                            name_vaddr = vaddr + (pos - foff); break
                    if name_vaddr:
                        name_bytes = struct.pack("<Q", name_vaddr)
                        # Search __objc_const for ivar_t with this name_ptr
                        q = oc_foff
                        while q < oc_foff + oc_size - 32:
                            if data[q+8:q+16] == name_bytes:
                                off_ptr_vm = read_u64(data, q)
                                off_ptr_file = vm_to_file(sections, off_ptr_vm)
                                if off_ptr_file:
                                    selectvc_ivar_offset = read_u32(data, off_ptr_file)
                                    print(f"[+] selectVC ivar offset: {selectvc_ivar_offset}")
                                break
                            q += 1
                    if selectvc_ivar_offset is not None: break
                    pos += 1
                if selectvc_ivar_offset is not None: break

        if selectvc_ivar_offset is None:
            print("[!] selectVC ivar offset not found"); sys.exit(1)

        # Find installClick IMP via class object chain
        # class_ro_t layout (64-bit): flags(4), instanceStart(4), instanceSize(4),
        #   reserved(4), ivarLayout(8), name*(8), baseMethods*(8), ...
        # name is at offset 24, baseMethods at offset 32

        installclick_imp_vaddr = None
        ic_str_vaddr = mn_vaddr + ic_off
        print(f"[*] installClick str vaddr: {ic_str_vaddr:#x}")

        classname = b'DASignProcessVC\x00'
        classname_foff = data.find(classname)
        print(f"[*] DASignProcessVC at file offset: {classname_foff:#x}")

        classname_vaddr = None
        for (seg, sect), (foff, vaddr, size) in sections.items():
            if foff <= classname_foff < foff + size:
                classname_vaddr = vaddr + (classname_foff - foff); break
        print(f"[*] DASignProcessVC vaddr: {classname_vaddr:#x}" if classname_vaddr else "[!] classname vaddr not found")

        if classname_vaddr:
            classname_bytes = struct.pack("<Q", classname_vaddr)
            # Search entire binary for class_ro_t with this name pointer at offset 24
            for search_foff in range(0, len(data) - 48, 8):
                if data[search_foff+24:search_foff+32] == classname_bytes:
                    base_methods_vm = read_u64(data, search_foff + 32)
                    print(f"[*] class_ro_t at {search_foff:#x}, baseMethods vm: {base_methods_vm:#x}")
                    if base_methods_vm:
                        ml_foff = vm_to_file(sections, base_methods_vm)
                        if ml_foff:
                            ml_flags = read_u32(data, ml_foff)
                            ml_count = read_u32(data, ml_foff + 4)
                            is_rel   = bool(ml_flags & 0x80000000)
                            print(f"[*] method list: flags={ml_flags:#x} count={ml_count} relative={is_rel}")
                            msz = 12 if is_rel else 24
                            for i in range(ml_count):
                                m_foff  = ml_foff + 8 + i * msz
                                m_vaddr = base_methods_vm + 8 + i * msz
                                if is_rel:
                                    n_off = read_i32(data, m_foff)
                                    n_target = (m_vaddr + n_off) & 0xFFFFFFFFFFFFFFFF
                                    # n_target may be selref or string
                                    match = (n_target == ic_selref_vaddr or n_target == ic_str_vaddr)
                                    if not match:
                                        # check if n_target is a selref pointing to ic_str
                                        nf = vm_to_file(sections, n_target)
                                        if nf and read_u64(data, nf) == ic_str_vaddr:
                                            match = True
                                    if match:
                                        i_off = read_i32(data, m_foff + 8)
                                        imp_va = (m_vaddr + 8 + i_off) & 0xFFFFFFFFFFFFFFFF
                                        # follow B stub if needed
                                        stubs_k = ('__TEXT', '__objc_stubs')
                                        if stubs_k in sections:
                                            sk_foff, sk_vaddr, sk_size = sections[stubs_k]
                                            if sk_vaddr <= imp_va < sk_vaddr + sk_size:
                                                sf = vm_to_file(sections, imp_va)
                                                instr = read_u32(data, sf)
                                                if (instr >> 26) == 0b000101:
                                                    imm26 = instr & 0x3FFFFFF
                                                    if imm26 & 0x2000000: imm26 |= ~0x3FFFFFF
                                                    imp_va = (imp_va + imm26 * 4) & 0xFFFFFFFFFFFFFFFF
                                        installclick_imp_vaddr = imp_va
                                        print(f"[+] installClick IMP vm: {imp_va:#x}")
                                        break
                                else:
                                    n_ptr = read_u64(data, m_foff)
                                    # absolute method_t: name is SEL (pointer to string), not selref
                                    if n_ptr == ic_str_vaddr or n_ptr == ic_selref_vaddr:
                                        installclick_imp_vaddr = read_u64(data, m_foff + 16)
                                        print(f"[+] installClick IMP vm (abs): {installclick_imp_vaddr:#x}")
                                        break
                    if installclick_imp_vaddr: break

        if not installclick_imp_vaddr:
            print("[!] installClick IMP not found"); sys.exit(1)

        installclick_imp_foff = vm_to_file(sections, installclick_imp_vaddr)
        print(f"[+] installClick IMP file offset: {installclick_imp_foff:#x}")

        # ── ARM64 instruction encoders ──────────────────────────────────────

        def stp_pre(rt1, rt2, rn, imm):   # STP Xt1,Xt2,[Xn,#imm]!
            imm7 = (imm // 8) & 0x7F
            return struct.pack("<I", 0xA9800000 | (imm7 << 15) | (rt2 << 10) | (rn << 5) | rt1)

        def ldp_post(rt1, rt2, rn, imm):  # LDP Xt1,Xt2,[Xn],#imm
            imm7 = (imm // 8) & 0x7F
            return struct.pack("<I", 0xA8C00000 | (imm7 << 15) | (rt2 << 10) | (rn << 5) | rt1)

        def add_imm(rd, rn, imm):          # ADD Xd,Xn,#imm
            return struct.pack("<I", 0x91000000 | ((imm & 0xFFF) << 10) | (rn << 5) | rd)

        def adrp(rd, pc_va, target_va):    # ADRP Xd, page
            pc_page  = pc_va & ~0xFFF
            tgt_page = target_va & ~0xFFF
            imm      = ((tgt_page - pc_page) >> 12) & 0x1FFFFF
            immlo    = imm & 3
            immhi    = (imm >> 2) & 0x7FFFF
            return struct.pack("<I", 0x90000000 | (immlo << 29) | (immhi << 5) | rd)

        def ldr_imm(rt, rn, imm):          # LDR Xt,[Xn,#imm]  (imm multiple of 8)
            imm12 = (imm // 8) & 0xFFF
            return struct.pack("<I", 0xF9400000 | (imm12 << 10) | (rn << 5) | rt)

        def bl(pc_va, target_va):          # BL target
            off   = (target_va - pc_va) & 0xFFFFFFFF
            imm26 = (off >> 2) & 0x3FFFFFF
            return struct.pack("<I", 0x94000000 | imm26)

        def ret():
            return struct.pack("<I", 0xD65F03C0)

        # ── Build patch ─────────────────────────────────────────────────────
        # Goal: [self->_selectVC signSuccess]
        #
        # STP  x29, x30, [sp, #-16]!
        # ADD  x29, sp,  #0
        # LDR  x0,  [x0, #selectvc_ivar_offset]  ; x0 = self->_selectVC
        # ADRP x1,  page(ss_selref)
        # LDR  x1,  [x1, off(ss_selref)]
        # BL   _objc_msgSend          ; [selectVC signSuccess]
        # LDP  x29, x30, [sp], #16
        # RET

        X0,X1,X29,X30,SP = 0,1,29,30,31
        base = installclick_imp_vaddr
        patch = bytearray()

        def pc(): return base + len(patch)

        patch += stp_pre(X29, X30, SP, -16)
        patch += add_imm(X29, SP, 0)

        # LDR x0, [x0, #ivar_offset]  — load self->_selectVC
        patch += ldr_imm(X0, X0, selectvc_ivar_offset)

        patch += adrp(X1, pc(), ss_selref_vaddr)
        patch += ldr_imm(X1, X1, ss_selref_vaddr & 0xFFF)

        patch += bl(pc(), objc_msgSend_vaddr)

        patch += ldp_post(X29, X30, SP, 16)
        patch += ret()

        assert len(patch) == 32, f"patch size {len(patch)}"

        data[installclick_imp_foff:installclick_imp_foff + len(patch)] = patch
        print(f"[+] Wrote {len(patch)}-byte ARM64 patch at file offset {installclick_imp_foff:#x}")

        with open(binary_path, "wb") as f:
            f.write(data)
        print("[+] Binary patched successfully")
        PYEOF

    - name: Analyze signSuccess and verify patch
      run: |
        python3 << 'PYEOF'
        import struct, sys

        binary_path = "temp/Payload/DumpApp.app/DumpApp"
        with open(binary_path, "rb") as f:
            data = bytearray(f.read())

        def read_u32(data, off): return struct.unpack_from("<I", data, off)[0]
        def read_u64(data, off): return struct.unpack_from("<Q", data, off)[0]
        def read_i32(data, off): return struct.unpack_from("<i", data, off)[0]

        LC_SEGMENT_64 = 0x19

        def find_sections(data, mh_off):
            sections = {}
            ncmds = read_u32(data, mh_off + 16)
            p = mh_off + 32
            for _ in range(ncmds):
                cmd     = read_u32(data, p)
                cmdsize = read_u32(data, p + 4)
                if cmd == LC_SEGMENT_64:
                    segname = data[p+8:p+24].rstrip(b'\x00').decode()
                    nsects  = read_u32(data, p + 64)
                    sp = p + 72
                    for _ in range(nsects):
                        sectname = data[sp:sp+16].rstrip(b'\x00').decode()
                        vm_addr  = read_u64(data, sp + 32)
                        vm_size  = read_u64(data, sp + 40)
                        file_off = read_u32(data, sp + 48)
                        sections[(segname, sectname)] = (file_off, vm_addr, vm_size)
                        sp += 80
                p += cmdsize
            return sections

        def vm_to_file(sections, vm_addr):
            for (seg, sect), (foff, vaddr, size) in sections.items():
                if vaddr <= vm_addr < vaddr + size:
                    return foff + (vm_addr - vaddr)
            return None

        magic  = read_u32(data, 0)
        mh_off = 0
        if magic == struct.unpack(">I", b'\xCA\xFE\xBA\xBE')[0]:
            narch = struct.unpack_from(">I", data, 4)[0]
            for i in range(narch):
                base     = 8 + i * 20
                cpu_type = struct.unpack_from(">I", data, base)[0]
                if cpu_type == 0x0100000C:
                    mh_off = struct.unpack_from(">I", data, base + 8)[0]; break

        sections = find_sections(data, mh_off)

        mn_key = ('__TEXT', '__objc_methnames')
        if mn_key not in sections: mn_key = ('__TEXT', '__objc_methname')
        mn_foff, mn_vaddr, mn_size = sections[mn_key]

        sr_key = ('__DATA', '__objc_selrefs')
        if sr_key not in sections: sr_key = ('__DATA_CONST', '__objc_selrefs')
        sr_foff, sr_vaddr, sr_size = sections[sr_key]

        # selref_va -> selector name
        selref_to_name = {}
        for i in range(0, sr_size, 8):
            ptr = read_u64(data, sr_foff + i)
            if mn_vaddr <= ptr < mn_vaddr + mn_size:
                sf = mn_foff + (ptr - mn_vaddr)
                name = b''
                j = sf
                while j < len(data) and data[j]: name += bytes([data[j]]); j += 1
                selref_to_name[sr_vaddr + i] = name.decode(errors='replace')

        stubs_k      = ('__TEXT', '__stubs')
        objc_stubs_k = ('__TEXT', '__objc_stubs')

        def decode_adrp_ldr(stub_va, sf):
            i0 = read_u32(data, sf)
            i1 = read_u32(data, sf + 4)
            # ADRP: bit31=1, bits[28:24]=10000
            if not ((i0 >> 31) == 1 and ((i0 >> 24) & 0x1F) == 0x10):
                return None
            immlo = (i0 >> 29) & 3
            immhi = (i0 >> 5) & 0x7FFFF
            imm   = ((immhi << 2) | immlo) << 12
            if imm & (1 << 32): imm -= (1 << 33)
            page  = (stub_va & ~0xFFF) + imm
            # LDR (unsigned offset, 64-bit): bits[31:22] == 0x3E5
            if (i1 & 0xFFC00000) != 0xF9400000:
                return None
            imm12 = (i1 >> 10) & 0xFFF
            return page + imm12 * 8

        def resolve_stub(stub_va):
            for sk in [stubs_k, objc_stubs_k]:
                if sk not in sections: continue
                sk_foff, sk_vaddr, sk_size = sections[sk]
                if not (sk_vaddr <= stub_va < sk_vaddr + sk_size): continue
                sf = vm_to_file(sections, stub_va)
                if sf is None: continue
                target_va = decode_adrp_ldr(stub_va, sf)
                if target_va is None: continue
                # target_va is the selref address directly (__objc_stubs)
                if target_va in selref_to_name:
                    return selref_to_name[target_va]
                # or a GOT entry pointing to the selref (__stubs)
                tf = vm_to_file(sections, target_va)
                if tf:
                    ptr = read_u64(data, tf)
                    if ptr in selref_to_name:
                        return selref_to_name[ptr]
                    # ptr might be the string directly
                    if mn_vaddr <= ptr < mn_vaddr + mn_size:
                        sf2 = mn_foff + (ptr - mn_vaddr)
                        name = b''
                        j = sf2
                        while j < len(data) and data[j]: name += bytes([data[j]]); j += 1
                        return name.decode(errors='replace')
                # dump raw bytes for manual inspection
                raw = data[sf:sf+12].hex()
                return f"raw={raw} target_va={target_va:#x}"
            return f"not_in_stubs"

        # ── Find signSuccess IMP ──────────────────────────────────────────────
        ss_str_off = data[mn_foff:mn_foff+mn_size].find(b'signSuccess\x00')
        ss_str_vaddr = mn_vaddr + ss_str_off

        da_sel_classname = b'DASelectAppVC\x00'
        da_sel_foff = data.find(da_sel_classname)
        da_sel_vaddr = None
        for (seg, sect), (foff, vaddr, size) in sections.items():
            if foff <= da_sel_foff < foff + size:
                da_sel_vaddr = vaddr + (da_sel_foff - foff); break

        ss_imp_vaddr = None
        if da_sel_vaddr:
            cn_bytes = struct.pack("<Q", da_sel_vaddr)
            for q in range(0, len(data) - 48, 8):
                if data[q+24:q+32] == cn_bytes:
                    bm_vm = read_u64(data, q + 32)
                    if not bm_vm: continue
                    ml_f = vm_to_file(sections, bm_vm)
                    if not ml_f: continue
                    ml_flags = read_u32(data, ml_f)
                    ml_count = read_u32(data, ml_f + 4)
                    is_rel = bool(ml_flags & 0x80000000)
                    msz = 12 if is_rel else 24
                    for i in range(ml_count):
                        mf = ml_f + 8 + i * msz
                        mv = bm_vm + 8 + i * msz
                        if is_rel:
                            n_off = read_i32(data, mf)
                            nt = (mv + n_off) & 0xFFFFFFFFFFFFFFFF
                            nf = vm_to_file(sections, nt)
                            match = (nt == ss_str_vaddr) or (nf and read_u64(data, nf) == ss_str_vaddr)
                            if match:
                                i_off = read_i32(data, mf + 8)
                                ss_imp_vaddr = (mv + 8 + i_off) & 0xFFFFFFFFFFFFFFFF; break
                        else:
                            if read_u64(data, mf) == ss_str_vaddr:
                                ss_imp_vaddr = read_u64(data, mf + 16); break
                    if ss_imp_vaddr: break

        if not ss_imp_vaddr:
            print("[!] signSuccess IMP not found"); sys.exit(1)

        ss_foff = vm_to_file(sections, ss_imp_vaddr)
        print(f"[*] signSuccess IMP vm={ss_imp_vaddr:#x} file={ss_foff:#x}")

        # ── Decode signSuccess: dump all instructions with BL targets ─────────
        print("[*] signSuccess disasm (BL/RET only shown with context):")
        for i in range(100):
            foff = ss_foff + i * 4
            instr = read_u32(data, foff)
            va    = ss_imp_vaddr + i * 4
            if (instr >> 26) == 0b100101:  # BL
                imm26 = instr & 0x3FFFFFF
                if imm26 & 0x2000000: imm26 |= ~0x3FFFFFF
                tgt = (va + imm26 * 4) & 0xFFFFFFFFFFFFFFFF
                sel = resolve_stub(tgt)
                print(f"  [{i:2d}] {va:#x} BL {tgt:#x}  => {sel}")
            elif instr == 0xD65F03C0:  # RET
                print(f"  [{i:2d}] {va:#x} RET")
                break

        # ── Dump raw signSuccess bytes for manual decode ──────────────────────
        print("[*] signSuccess raw words:")
        for i in range(22):
            w = read_u32(data, ss_foff + i*4)
            print(f"  [{i:2d}] {w:#010x}")

        # ── Verify ivar ownership: which class_ro_t contains ivar_t at 0xd9c5e8 ──
        ivar_t_foff = 0xd9c5e8
        ivar_t_vm   = None
        for (seg, sect), (foff, vaddr, size) in sections.items():
            if foff <= ivar_t_foff < foff + size:
                ivar_t_vm = vaddr + (ivar_t_foff - foff); break
        print(f"[*] ivar_t vm={ivar_t_vm:#x}")

        # Search __objc_const for ivar_list_t that contains this ivar_t
        oc_key = ('__DATA', '__objc_const')
        if oc_key not in sections: oc_key = ('__DATA_CONST', '__objc_const')
        oc_foff, oc_vaddr, oc_size = sections[oc_key]

        # ivar_list_t: entsize(4), count(4), ivar_t[count]
        # ivar_t size = 32 bytes
        # We look for an ivar_list_t whose first ivar_t starts at or before ivar_t_vm
        # and whose range covers ivar_t_vm
        ivar_list_vm = None
        for q in range(oc_foff, oc_foff + oc_size - 8, 8):
            entsize = read_u32(data, q)
            count   = read_u32(data, q + 4)
            if entsize == 32 and 1 <= count <= 50:
                list_vm = oc_vaddr + (q - oc_foff)
                first_ivar_vm = list_vm + 8
                last_ivar_vm  = first_ivar_vm + (count - 1) * 32
                if first_ivar_vm <= ivar_t_vm <= last_ivar_vm:
                    ivar_list_vm = list_vm
                    print(f"[+] ivar_list_t vm={list_vm:#x} count={count}")
                    break

        # Now find class_ro_t that has ivars* pointing to this ivar_list_t
        if ivar_list_vm:
            il_bytes = struct.pack("<Q", ivar_list_vm)
            for q in range(0, len(data) - 48, 8):
                # class_ro_t: ivars* at offset 40
                if data[q+40:q+48] == il_bytes:
                    name_ptr = read_u64(data, q + 24)
                    nf = vm_to_file(sections, name_ptr)
                    if nf:
                        name = b''
                        j = nf
                        while j < len(data) and data[j]: name += bytes([data[j]]); j += 1
                        print(f"[+] class_ro_t at {q:#x} => class name: {name.decode(errors='replace')}")
                    break
        # ── Extra: resolve class name (in __TEXT,__objc_classname) ──────────
        name_ptr_foff = 0xd9c988 + 24
        name_ptr = read_u64(data, name_ptr_foff)
        print(f"[*] class_ro_t name_ptr = {name_ptr:#x}")
        # Try direct file offset lookup for __TEXT sections
        cn_key = ('__TEXT', '__objc_classname')
        if cn_key in sections:
            cn_foff, cn_vaddr, cn_size = sections[cn_key]
            if cn_vaddr <= name_ptr < cn_vaddr + cn_size:
                nf = cn_foff + (name_ptr - cn_vaddr)
                name = b''
                j = nf
                while j < len(data) and data[j]: name += bytes([data[j]]); j += 1
                print(f"[+] class name = {name.decode(errors='replace')}")
            else:
                print(f"[!] name_ptr {name_ptr:#x} not in __objc_classname ({cn_vaddr:#x}..{cn_vaddr+cn_size:#x})")
        else:
            print("[!] __TEXT,__objc_classname section not found")

        # Also check: does DASignProcessVC have a setSelectVC: or selectVC setter?
        # Search for 'setSelectVC' in methnames
        for sel_name in [b'setSelectVC:\x00', b'setSelectVC\x00', b'selectVC\x00']:
            off = data[mn_foff:mn_foff+mn_size].find(sel_name)
            if off >= 0:
                print(f"[+] Found selector: {sel_name.rstrip(b'\\x00').decode()}")

        # Decode signSuccess instruction [12] = 0xd2800022
        # MOVZ X2, #1 -> setSelectedSegmentIndex: called with index=1
        w12 = read_u32(data, ss_foff + 12*4)
        print(f"[*] signSuccess instr[12] = {w12:#010x}")
        if w12 == 0xd2800022:
            print("[+] MOVZ X2, #1 -> setSelectedSegmentIndex: called with index=1 (已定制 tab)")

        # ── Check DASignProcessVC's actual ivar list ──────────────────────────
        # DASignProcessVC class_ro_t is at file 0xdd6188
        # class_ro_t layout: flags(4),instanceStart(4),instanceSize(4),reserved(4),
        #   ivarLayout*(8), name*(8), baseMethods*(8), baseProtocols*(8), ivars*(8)
        # ivars* is at offset 48 = file 0xdd6188+48 = 0xdd61b8
        da_cro_foff = 0xdd6188
        ivars_ptr = read_u64(data, da_cro_foff + 48)
        print(f"[*] DASignProcessVC class_ro_t ivars* = {ivars_ptr:#x}")
        if ivars_ptr:
            il_f = vm_to_file(sections, ivars_ptr)
            if il_f:
                il_entsize = read_u32(data, il_f)
                il_count   = read_u32(data, il_f + 4)
                print(f"[*] DASignProcessVC ivar_list: entsize={il_entsize} count={il_count}")
                for i in range(min(il_count, 10)):
                    iv_f = il_f + 8 + i * 32
                    off_ptr = read_u64(data, iv_f)
                    name_ptr2 = read_u64(data, iv_f + 8)
                    # resolve name
                    nf2 = vm_to_file(sections, name_ptr2)
                    iname = b''
                    if nf2:
                        j = nf2
                        while j < len(data) and data[j]: iname += bytes([data[j]]); j += 1
                    # resolve offset value
                    off_f = vm_to_file(sections, off_ptr)
                    ioff = read_u32(data, off_f) if off_f else 0
                    print(f"  ivar[{i}] name={iname.decode(errors='replace')} offset={ioff}")
            else:
                print(f"[!] ivars_ptr {ivars_ptr:#x} not in sections")
        else:
            print("[!] DASignProcessVC has no ivars (ivars*=0)")

        # ── Find selectVC selref and installClick function size ───────────────
        sv_str_off = data[mn_foff:mn_foff+mn_size].find(b'selectVC\x00')
        if sv_str_off >= 0:
            sv_str_vaddr = mn_vaddr + sv_str_off
            sv_selref_vaddr = None
            for i in range(0, sr_size, 8):
                if read_u64(data, sr_foff + i) == sv_str_vaddr:
                    sv_selref_vaddr = sr_vaddr + i; break
            print(f"[*] selectVC str vaddr: {sv_str_vaddr:#x}")
            print(f"[*] selectVC selref: {sv_selref_vaddr:#x}" if sv_selref_vaddr else "[!] selectVC selref not found")

        # Find installClick function size by scanning for RET
        ic_imp_foff = 0x27aa1c
        ic_imp_vaddr = 0x10027aa1c
        print(f"[*] Scanning installClick from {ic_imp_foff:#x}:")
        for i in range(200):
            w = read_u32(data, ic_imp_foff + i*4)
            if w == 0xD65F03C0:  # RET
                print(f"  RET at index {i}, offset +{i*4} bytes, total size >= {(i+1)*4} bytes")
                break
            if (w >> 26) == 0b100101:  # BL
                imm26 = w & 0x3FFFFFF
                if imm26 & 0x2000000: imm26 |= ~0x3FFFFFF
                tgt = (ic_imp_vaddr + i*4 + imm26*4) & 0xFFFFFFFFFFFFFFFF
                print(f"  [{i:3d}] BL {tgt:#x}")

        # ── Find selectVC selref by scanning ALL occurrences ─────────────────
        # The methnames section may have 'selectVC\x00' at multiple positions
        # We need to find ALL of them and check which one has a selref
        sv_name = b'selectVC\x00'
        pos = 0
        while True:
            off = data[mn_foff:mn_foff+mn_size].find(sv_name, pos)
            if off < 0: break
            sv_va = mn_vaddr + off
            # Check if this exact address is pointed to by any selref
            sv_bytes = struct.pack("<Q", sv_va)
            found = False
            for i in range(0, sr_size, 8):
                if data[sr_foff+i:sr_foff+i+8] == sv_bytes:
                    print(f"[+] selectVC selref at {sr_vaddr+i:#x} -> str {sv_va:#x} (methname off {off:#x})")
                    found = True
            if not found:
                print(f"[*] selectVC str at {sv_va:#x} (off {off:#x}) - no selref")
            pos = off + 1

        # ── Find selectVC getter IMP in DASignProcessVC ───────────────────────
        # Search for 'selectVC\x00' in methnames, then find method in DASignProcessVC
        sv_str_off2 = data[mn_foff:mn_foff+mn_size].find(b'selectVC\x00')
        if sv_str_off2 >= 0:
            sv_str_va2 = mn_vaddr + sv_str_off2
            da_cro2_foff = 0xdd6188
            bm_vm2 = read_u64(data, da_cro2_foff + 32)
            if bm_vm2:
                ml2_f = vm_to_file(sections, bm_vm2)
                if ml2_f:
                    ml2_flags = read_u32(data, ml2_f)
                    ml2_count = read_u32(data, ml2_f + 4)
                    is_rel2 = bool(ml2_flags & 0x80000000)
                    msz2 = 12 if is_rel2 else 24
                    print(f"[*] DASignProcessVC methods: flags={ml2_flags:#x} count={ml2_count} rel={is_rel2}")
                    for i in range(ml2_count):
                        mf2 = ml2_f + 8 + i * msz2
                        mv2 = bm_vm2 + 8 + i * msz2
                        if is_rel2:
                            n_off2 = read_i32(data, mf2)
                            nt2 = (mv2 + n_off2) & 0xFFFFFFFFFFFFFFFF
                            nf2 = vm_to_file(sections, nt2)
                            name_match2 = (nt2 == sv_str_va2) or (nf2 and read_u64(data, nf2) == sv_str_va2)
                        else:
                            name_match2 = (read_u64(data, mf2) == sv_str_va2)
                        if name_match2:
                            if is_rel2:
                                i_off2 = read_i32(data, mf2 + 8)
                                imp2 = (mv2 + 8 + i_off2) & 0xFFFFFFFFFFFFFFFF
                            else:
                                imp2 = read_u64(data, mf2 + 16)
                            print(f"[+] selectVC getter IMP in DASignProcessVC: {imp2:#x}")
                            imp2_f = vm_to_file(sections, imp2)
                            if imp2_f:
                                for j in range(8):
                                    print(f"  [{j}] {read_u32(data, imp2_f+j*4):#010x}")
                            break
        PYEOF

    - name: Remove old signature
      run: rm -rf temp/Payload/DumpApp.app/_CodeSignature

    - name: Repackage IPA
      run: cd temp && zip -qr ../2_modified.ipa Payload

    - name: Upload modified IPA
      uses: actions/upload-artifact@v4
      with:
        name: modified-ipa
        path: 2_modified.ipa
        retention-days: 7
